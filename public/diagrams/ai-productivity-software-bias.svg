<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320"
     width="1000" height="320" role="img"
     aria-label="Park et al. 2025: AI-assisted HAZOP output scored 86% on textual plausibility but 19 to 37% on semantic validity.">
  <rect width="1000" height="320" fill="#0b0b0f"/>

  <text x="500.0" y="70" text-anchor="middle"
        font-family="JetBrains Mono, ui-monospace, monospace"
        font-size="16" fill="#7a7a85" letter-spacing="2">ai-assisted hazop  ·  park et al. 2025</text>

  <text x="320" y="195" text-anchor="middle"
        font-family="JetBrains Mono, ui-monospace, monospace"
        font-size="76" font-weight="500" fill="#e8e8ed">86%</text>
  <text x="320" y="245" text-anchor="middle"
        font-family="JetBrains Mono, ui-monospace, monospace"
        font-size="20" fill="#9898a8">textual plausibility</text>

  <text x="680" y="195" text-anchor="middle"
        font-family="JetBrains Mono, ui-monospace, monospace"
        font-size="76" font-weight="500" fill="#e8e8ed">19–37%</text>
  <text x="680" y="245" text-anchor="middle"
        font-family="JetBrains Mono, ui-monospace, monospace"
        font-size="20" fill="#9898a8">semantic validity</text>

  <line x1="180.0" y1="285" x2="820.0" y2="285"
        stroke="#3a3a48" stroke-width="1" stroke-linecap="round"/>
</svg>
