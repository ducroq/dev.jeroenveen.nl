<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320"
     width="1000" height="320" role="img"
     aria-label="JetBrains 2025: software developers with 10+ years of experience report low trust in AI output 61% of the time. Developers with 0 to 2 years report low trust 48% of the time.">
  <rect width="1000" height="320" fill="#0b0b0f"/>

  <text x="500.0" y="70" text-anchor="middle"
        font-family="JetBrains Mono, ui-monospace, monospace"
        font-size="16" fill="#7a7a85" letter-spacing="2">low trust in ai output  ·  jetbrains 2025</text>

  <text x="320" y="195" text-anchor="middle"
        font-family="JetBrains Mono, ui-monospace, monospace"
        font-size="76" font-weight="500" fill="#e8e8ed">61%</text>
  <text x="320" y="245" text-anchor="middle"
        font-family="JetBrains Mono, ui-monospace, monospace"
        font-size="20" fill="#9898a8">10+ years</text>

  <text x="680" y="195" text-anchor="middle"
        font-family="JetBrains Mono, ui-monospace, monospace"
        font-size="76" font-weight="500" fill="#e8e8ed">48%</text>
  <text x="680" y="245" text-anchor="middle"
        font-family="JetBrains Mono, ui-monospace, monospace"
        font-size="20" fill="#9898a8">0–2 years</text>

  <line x1="180.0" y1="285" x2="820.0" y2="285"
        stroke="#3a3a48" stroke-width="1" stroke-linecap="round"/>
</svg>
